        const dates = ['2026-04-04', '2026-04-05', '2026-04-06', '2026-04-07', '2026-04-08', '2026-04-09'];
        const dateLabels = ['Sat Apr 4', 'Sun Apr 5', 'Mon Apr 6', 'Tue Apr 7', 'Wed Apr 8', 'Thu Apr 9'];
        let currentDate = dates[0];
        let currentView = 'map';
        let map;
        let markerClusterGroup;

        // Get description for artist
        function getArtistDescription(artistName) {
            for (const [key, description] of Object.entries(artistDescriptions)) {
                if (artistName.includes(key) || key.includes(artistName)) {
                    return description;
                }
            }
            return null;
        }

        // Initialize map
        function initMap() {
            map = L.map('map').setView([29.9511, -90.2623], 12);

            L.tileLayer('https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors, &copy; CartoDB',
                maxZoom: 19
            }).addTo(map);

            markerClusterGroup = L.markerClusterGroup({
                maxClusterRadius: 80,
                disableClusteringAtZoom: 15
            });
            map.addLayer(markerClusterGroup);

            renderDayButtons();
            renderMarkersForDate(currentDate);
            renderListView(currentDate);
            attachViewToggleListeners();
        }

        // Render day navigation buttons
        function renderDayButtons() {
            const dayNav = document.getElementById('dayNav');
            dayNav.innerHTML = '';

            dates.forEach((date, index) => {
                const button = document.createElement('button');
                button.className = 'day-btn' + (date === currentDate ? ' active' : '');

                const eventCount = eventData[date].length;
                button.innerHTML = `${dateLabels[index]} <span class="event-badge">${eventCount}</span>`;

                button.addEventListener('click', () => {
                    currentDate = date;
                    renderDayButtons();
                    renderMarkersForDate(date);
                    renderListView(date);
                });

                dayNav.appendChild(button);
            });
        }

        // Render markers for selected date
        function renderMarkersForDate(date) {
            markerClusterGroup.clearLayers();

            const events = eventData[date];
            const venueMap = {};

            // Group events by venue
            events.forEach(event => {
                if (!venueMap[event.venue]) {
                    venueMap[event.venue] = {
                        lat: event.lat,
                        lng: event.lng,
                        events: []
                    };
                }
                venueMap[event.venue].events.push(event);
            });

            // Create markers for each venue
            Object.keys(venueMap).forEach(venueName => {
                const venue = venueMap[venueName];
                const marker = L.marker([venue.lat, venue.lng], {
                    icon: createCustomIcon()
                });

                // Build popup content
                let popupContent = `<div class="venue-popup">
                    <div class="venue-popup-title">${venueName}</div>
                    <div class="venue-events">`;

                venue.events.forEach(event => {
                    const artistName = event.artist.split(' ft.')[0].split(' with ')[0].split(' + ')[0].trim();
                    const description = getArtistDescription(event.artist);
                    const appleMusicLink = `https://music.apple.com/us/search?term=${encodeURIComponent(artistName)}`;
                    const wwozLink = `https://www.wwoz.org${event.link}`;

                    popupContent += `<div class="venue-event">
                        <div class="event-time">${event.time}</div>
                        <div class="event-artist">${event.artist}</div>`;

                    if (description) {
                        popupContent += `<div class="event-description">${description}</div>`;
                    }

                    popupContent += `<div class="venue-links">
                            <a href="${wwozLink}" target="_blank" class="venue-link">WWOZ</a>
                            <a href="${appleMusicLink}" target="_blank" class="venue-link apple-music-link">Apple Music</a>
                        </div>
                    </div>`;
                });

                popupContent += `</div>
                </div>`;

                marker.bindPopup(popupContent);
                markerClusterGroup.addLayer(marker);
            });
        }

        // Render list view
        function renderListView(date) {
            const listContent = document.getElementById('listContent');
            listContent.innerHTML = '';

            const events = eventData[date];
            const venueMap = {};

            // Group events by venue
            events.forEach(event => {
                if (!venueMap[event.venue]) {
                    venueMap[event.venue] = [];
                }
                venueMap[event.venue].push(event);
            });

            // Sort venues alphabetically
            const sortedVenues = Object.keys(venueMap).sort();

            sortedVenues.forEach(venueName => {
                const venueCard = document.createElement('div');
                venueCard.className = 'venue-card';

                let cardContent = `<div class="venue-card-title">${venueName}</div>`;

                venueMap[venueName].forEach(event => {
                    const artistName = event.artist.split(' ft.')[0].split(' with ')[0].split(' + ')[0].trim();
                    const description = getArtistDescription(event.artist);
                    const appleMusicLink = `https://music.apple.com/us/search?term=${encodeURIComponent(artistName)}`;
                    const wwozLink = `https://www.wwoz.org${event.link}`;

                    cardContent += `<div class="venue-card-event">
                        <div class="event-card-time">${event.time}</div>
                        <div class="event-card-artist">${event.artist}</div>`;

                    if (description) {
                        cardContent += `<div class="event-card-description">${description}</div>`;
                    }

                    cardContent += `<div class="venue-card-links">
                            <a href="${wwozLink}" target="_blank" class="venue-card-link">WWOZ</a>
                            <a href="${appleMusicLink}" target="_blank" class="venue-card-link apple-music-link">Apple</a>
                        </div>
                    </div>`;
                });

                venueCard.innerHTML = cardContent;
                listContent.appendChild(venueCard);
            });
        }

        // View toggle functionality
        function attachViewToggleListeners() {
            const mapViewBtn = document.getElementById('mapViewBtn');
            const listViewBtn = document.getElementById('listViewBtn');
            const mapEl = document.getElementById('map');
            const listEl = document.getElementById('listContainer');

            mapViewBtn.addEventListener('click', () => {
                currentView = 'map';
                mapViewBtn.classList.add('active');
                listViewBtn.classList.remove('active');
                mapEl.classList.add('active');
                listEl.classList.remove('active');
                setTimeout(() => {
                    map.invalidateSize();
                }, 100);
            });

            listViewBtn.addEventListener('click', () => {
                currentView = 'list';
                listViewBtn.classList.add('active');
                mapViewBtn.classList.remove('active');
                listEl.classList.add('active');
                mapEl.classList.remove('active');
            });
        }

        // Create custom marker icon
        function createCustomIcon() {
            const html = '<div class="custom-marker"></div>';
            return L.divIcon({
                html: html,
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                popupAnchor: [0, -32],
                className: 'custom-marker-container'
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
